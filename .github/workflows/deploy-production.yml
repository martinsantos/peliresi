name: Deploy SITREP to Production

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'

env:
  DRY_RUN: true  # Cambiar a 'false' cuando se apruebe migración

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || contains(github.event.head_commit.added, 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Package Frontend
        run: |
          cd frontend/dist
          tar czf /tmp/sitrep-frontend-deploy.tar.gz .

      - name: Upload to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/sitrep-frontend-deploy.tar.gz
          target: /tmp/

      - name: Deploy Frontend (Dry-Run)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_frontend.sh

  deploy-backend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || contains(github.event.head_commit.added, 'backend/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          npm ci --production
          npm run build

      - name: Package Backend
        run: |
          cd backend
          tar czf /tmp/sitrep-backend-deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            prisma/

      - name: Upload to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: /tmp/sitrep-backend-deploy.tar.gz
          target: /tmp/

      - name: Deploy Backend (Dry-Run)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_backend.sh
