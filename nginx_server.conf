server {
    if ($host = www.ultimamilla.com.ar) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = ultimamilla.com.ar) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ultimamilla.com.ar www.ultimamilla.com.ar;    
    # Serve images directly on HTTP to prevent Cloudflare redirect loops
    location /imagenes_antecedentes_versionproduccion/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ultimamilla.com.ar www.ultimamilla.com.ar;        
    # Configuración SSL
    ssl_certificate /etc/letsencrypt/live/ultimamilla.com.ar-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ultimamilla.com.ar-0001/privkey.pem; # managed by Certbot

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============ DEMO AMBIENTE ============
    # Frontend SPA (archivos estáticos)
    location /demoambiente/ {
        alias /var/www/demoambiente/;
        index index.html;
        try_files $uri $uri/ /demoambiente/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
    
    # Redirección sin slash final
    location = /demoambiente {
        return 301 /demoambiente/;
    }
    
    # Backend API Trazabilidad
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    # ============ FIN DEMO AMBIENTE ============

    # Proxy a Astro SSR (sitio principal)
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Proxy DIRECTO para archivos Astro
    location ^~ /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes de antecedentes
    location /imagenes_antecedentes_versionproduccion/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Proxy a Directus Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8055/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirección de /admin sin slash a /admin/
    location = /admin {
        return 301 $scheme://$host/admin/;
    }
}
