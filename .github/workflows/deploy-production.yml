name: Deploy SITREP to Production

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docs/manual/**'
      - 'docs/screenshots/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - frontend-only
          - backend-only
          - both

env:
  DRY_RUN: false  # Real deployment activated

jobs:
  deploy-frontend:
    if: github.event_name == 'push' || github.event.inputs.deploy_target != 'backend-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Frontend Source
        run: |
          tar czf /tmp/sitrep-frontend-source.tar.gz frontend/ docs/manual/ docs/screenshots/desktop/ docs/screenshots/mobile/

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Source to VPS
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sitrep-frontend-source.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Build and Deploy Frontend on VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_frontend_with_build.sh
          ENDSSH

  validate-backend:
    if: github.event_name == 'push' || github.event.inputs.deploy_target != 'frontend-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: TypeScript type-check
        run: cd backend && npx tsc --noEmit

      - name: Build backend
        run: cd backend && npm run build

  deploy-backend:
    needs: validate-backend
    if: github.event_name == 'push' || github.event.inputs.deploy_target != 'frontend-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Backend Source
        run: |
          tar czf /tmp/sitrep-backend-source.tar.gz backend/

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Source to VPS
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sitrep-backend-source.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Build and Deploy Backend on VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_backend_with_build.sh
          ENDSSH
