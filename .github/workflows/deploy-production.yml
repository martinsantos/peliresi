name: Deploy SITREP to Production

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'

env:
  DRY_RUN: true  # Cambiar a 'false' cuando se apruebe migración

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || contains(github.event.head_commit.added, 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Package Frontend
        run: |
          cd frontend/dist
          tar czf /tmp/sitrep-frontend-deploy.tar.gz .

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sitrep-frontend-deploy.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Deploy Frontend (Dry-Run)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_frontend.sh
          ENDSSH

  deploy-backend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || contains(github.event.head_commit.added, 'backend/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend
        run: |
          cd backend
          npm ci --production
          npm run build

      - name: Package Backend
        run: |
          cd backend
          tar czf /tmp/sitrep-backend-deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            prisma/ \
            ecosystem.config.js

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sitrep-backend-deploy.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Deploy Backend (Dry-Run)
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            export DRY_RUN=${{ env.DRY_RUN }}
            bash /opt/scripts-cicd/deploy_sitrep_backend.sh
          ENDSSH
