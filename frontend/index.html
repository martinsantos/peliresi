  <meta name="googlebot" content="noindex, nofollow" />

  <title>Trazabilidad RRPP - Gobierno de Mendoza</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- EMERGENCY v9.2: Limpieza con AWAIT correcto -->
  <script>
    (async function() {
      var EMERGENCY_VERSION = 'v9.2.0-REFACTOR';
      var lastVersion = localStorage.getItem('sitrep_app_version');

      console.log('[EMERGENCY v9.2] Version:', EMERGENCY_VERSION, '| Anterior:', lastVersion);

      // FORZAR limpieza si la versión es diferente
      if (lastVersion !== EMERGENCY_VERSION) {
        console.log('[EMERGENCY v9.2] Ejecutando limpieza TOTAL...');

        var cleanupPromises = [];

        // 1. Eliminar TODOS los Service Workers
        if ('serviceWorker' in navigator) {
          var swPromise = navigator.serviceWorker.getRegistrations()
            .then(function(registrations) {
              console.log('[EMERGENCY v9.2] Eliminando', registrations.length, 'Service Workers');
              return Promise.all(registrations.map(function(reg) {
                return reg.unregister();
              }));
            })
            .then(function() {
              console.log('[EMERGENCY v9.2] Todos los SW eliminados');
            })
            .catch(function(e) {
              console.warn('[EMERGENCY v9.2] Error eliminando SW:', e);
            });
          cleanupPromises.push(swPromise);
        }

        // 2. Eliminar TODOS los caches
        if ('caches' in window) {
          var cachePromise = caches.keys()
            .then(function(keys) {
              console.log('[EMERGENCY v9.2] Eliminando', keys.length, 'caches');
              return Promise.all(keys.map(function(key) {
                return caches.delete(key);
              }));
            })
            .then(function() {
              console.log('[EMERGENCY v9.2] Caches eliminados');
            })
            .catch(function(e) {
              console.warn('[EMERGENCY v9.2] Error eliminando caches:', e);
            });
          cleanupPromises.push(cachePromise);
        }

        // 3. Limpiar IndexedDB de workbox
        if ('indexedDB' in window) {
          var idbPromise = new Promise(function(resolve) {
            try {
              var req1 = indexedDB.deleteDatabase('workbox-expiration');
              var req2 = indexedDB.deleteDatabase('workbox-precache-v2');
              req1.onsuccess = req1.onerror = function() {
                req2.onsuccess = req2.onerror = function() {
                  console.log('[EMERGENCY v9.2] IndexedDB limpiado');
                  resolve();
                };
              };
            } catch(e) {
              console.warn('[EMERGENCY v9.2] Error limpiando IndexedDB:', e);
              resolve();
            }
          });
          cleanupPromises.push(idbPromise);
        }

        // 4. ESPERAR a que TODO termine antes de continuar
        await Promise.all(cleanupPromises);
        console.log('[EMERGENCY v9.2] Limpieza completa');

        // 5. Marcar versión DESPUÉS de limpiar
        localStorage.setItem('sitrep_app_version', EMERGENCY_VERSION);

        // 6. Recargar para aplicar
        console.log('[EMERGENCY v9.2] Recargando...');
        window.location.reload(true);
      } else {
        console.log('[EMERGENCY v9.2] Ya limpiado, continuando...');
      }
    })();
  </script>
</body>

</html>
