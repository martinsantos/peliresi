server {
    listen 80;
    server_name sitrep.ultimamilla.com.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sitrep.ultimamilla.com.ar;

    # SSL - usar los certs existentes del dominio
    ssl_certificate /etc/letsencrypt/live/ultimamilla.com.ar-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ultimamilla.com.ar-0001/privkey.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ============================================
    # API Backend (puerto 3010)
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # ============================================
    # PWA Mobile App (/app/) - ANTES que /
    # ============================================
    location /app/ {
        alias /var/www/sitrep/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;

        # Cache assets con hash en filename
        location ~* /app/assets/ {
            alias /var/www/sitrep/app/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    location = /app {
        return 301 /app/;
    }

    # ============================================
    # Main SPA Frontend (/)
    # ============================================
    root /var/www/sitrep;

    # Cache assets con hash en filename
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback - index.html para todas las rutas
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;

        # No cachear index.html (para deploys frescos)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
