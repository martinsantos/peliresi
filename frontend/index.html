<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Mobile Meta Tags -->
  <meta name="theme-color" content="#10b981" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DGFA RRPP" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- SEO - Block indexing for demo -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="description" content="Sistema de Trazabilidad de Residuos Peligrosos - Gobierno de Mendoza" />

  <title>Trazabilidad RRPP - Gobierno de Mendoza</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script para limpiar Service Workers obsoletos de la demo anterior -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          if (registration.scope.includes('demoambiente')) {
            console.log('🧹 Limpiando SW obsoleto');
            registration.unregister().then(() => {
              window.location.reload();
            });
          }
        }
      });
    }
  </script>
</body>

</html>
