services:
  database:
    image: postgres:15-alpine
    container_name: sitrep-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sitrep123}
      POSTGRES_DB: ${DB_NAME:-trazabilidad_rrpp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: sitrep-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitrep-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-sitrep123}@database:5432/${DB_NAME:-trazabilidad_rrpp}?schema=public
      JWT_SECRET: ${JWT_SECRET:-sitrep-secret-key-123}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sitrep-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
